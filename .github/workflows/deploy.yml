name: API Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Cancel any in-progress deploy for the same ref to avoid race conditions.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: is the VPS configured yet? Secrets can't be read in job-level `if:`,
  # so surface VPS_HOST as an output the deploy jobs can branch on. Until the
  # VPS_HOST secret is set, the deploy jobs skip cleanly (skipped ≠ failed), so
  # `main` stays green; they auto-activate the moment the secret exists.
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "$VPS_HOST" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false — VPS_HOST not set; skipping SSH deploy" >> "$GITHUB_STEP_SUMMARY"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & push the Docker image to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine moving tag
        id: moving_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::7}"
          echo "sha_tag=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/winprop-api" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/winprop-api:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ github.repository_owner }}/winprop-api:${{ steps.moving_tag.outputs.tag }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to STAGING (push to main only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: [gate, build-and-push]
    if: needs.gate.outputs.deploy == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: SSH deploy to VPS (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/winprop
            # Pull the exact SHA image so this deploy is reproducible
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
              docker compose -f compose.staging.yml pull api
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
              docker compose -f compose.staging.yml up -d
            # Give the container time to run migrate + boot
            sleep 10
            # Health check — fails the step (and marks deployment failed) if unhealthy
            curl --fail --retry 5 --retry-delay 5 \
              "${{ vars.STAGING_URL }}/health" \
              && echo "Staging health check passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to PRODUCTION (version tag push only)
  # NOTE: configure required reviewers on the "production" Environment in
  #       GitHub → Settings → Environments → production → Required reviewers.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: [gate, build-and-push]
    if: needs.gate.outputs.deploy == 'true' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: SSH deploy to VPS (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/winprop
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
              docker compose -f compose.prod.yml pull api
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
              docker compose -f compose.prod.yml up -d
            sleep 10
            curl --fail --retry 5 --retry-delay 5 \
              "${{ vars.PRODUCTION_URL }}/health" \
              && echo "Production health check passed"
