name: winprop-prod

# Same topology as staging: WinProp runs NO Caddy of its own — the host's EXISTING
# shared Caddy (docker network `proxy`) terminates TLS and reverse-proxies to
# `winprop-api:3001`. Interpolated vars come from /opt/winprop/.env.prod (the deploy
# passes `--env-file .env.prod`).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-winprop}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-winprop_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-winprop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - internal

  api:
    image: ghcr.io/${GHCR_OWNER}/winprop-api:${IMAGE_TAG:-prod}
    container_name: winprop-api-prod       # stable target for the shared Caddy's reverse_proxy
    restart: unless-stopped
    env_file:
      - /opt/winprop/.env.prod
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - proxy

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${CADDY_NET}

volumes:
  postgres_prod_data:
