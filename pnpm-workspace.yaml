# pnpm 11 build-script approval policy (map of package -> allowed).
# true  = run its install/build script (native bindings / prisma engines need this)
# false = explicitly skip without erroring (telemetry-only packages)
allowBuilds:
  '@prisma/engines': true
  bcrypt: true
  prisma: true
  unrs-resolver: true
  '@scarf/scarf': false

overrides:
  multer: ">=2.2.0"
  "brace-expansion@>=1.0.0 <1.1.16": "1.1.16"
  "brace-expansion@>=2.0.0 <2.1.2": "2.1.2"
  "brace-expansion@>=3.0.0 <5.0.7": "5.0.7"
  "js-yaml@>=3.0.0 <3.15.0": "3.15.0"
  "js-yaml@>=4.0.0 <4.3.0": "4.3.0"
  "fast-uri@>=3.0.0 <3.1.4": "3.1.4"
